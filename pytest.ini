[pytest]
# Pytest Configuration for OASIS Agentic Pipeline

# Test discovery patterns
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Test paths
testpaths = tests

# Output options
addopts = 
    -v
    --strict-markers
    --tb=short
    --disable-warnings
    -ra
    --cov=src
    --cov-report=html
    --cov-report=term-missing
    --cov-report=xml
    --maxfail=5

# Markers for test categorization
markers =
    unit: Unit tests for individual components
    integration: Integration tests for multi-agent coordination
    slow: Tests that take significant time to run
    gpu: Tests that require GPU acceleration
    mock: Tests using mock data
    real_data: Tests requiring actual OASIS dataset
    benchmark: Performance benchmark tests
    edge_case: Edge case validation tests

# Coverage options
[coverage:run]
source = src
omit = 
    */tests/*
    */test_*.py
    */__pycache__/*
    */venv/*
    */.venv/*

[coverage:report]
precision = 2
show_missing = True
skip_covered = False

[coverage:html]
directory = htmlcov
